# generated for prospect-research-tool
app = "prospect-research-tool"
primary_region = "sjc"

[build]

[env]
  PORT = "3001"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
